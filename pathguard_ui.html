<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PATHGUARD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f0; font-family: system-ui, sans-serif; padding: 24px; }

  /* ─── Header ─────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 16px; border-bottom: 1px solid #e2e2dc; margin-bottom: 20px;
  }
  .logo { font-size: 1.2rem; font-weight: 700; }
  .status-badge {
    padding: 5px 12px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 600; border: 1px solid;
  }

  /* ─── Layout Grid ─────────────────────────────────────────── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: white; border: 1px solid #e2e2dc;
    border-radius: 10px; padding: 18px;
  }
  .card-title {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #aaa; margin-bottom: 12px;
  }
  .full-width { grid-column: 1 / 3; }

  /* ─── Network Graph Canvas ────────────────────────────────── */
  #network-graph {
    width: 100%; height: 320px;
    background: #f8f8f5; border-radius: 8px; border: 1px solid #e2e2dc;
  }

  /* ─── Node Status Grid ────────────────────────────────────── */
  .node-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .node-card {
    border-radius: 8px; padding: 10px 6px;
    text-align: center; border: 1px solid;
  }
  .node-card.SAFE     { background: #f0fdf4; border-color: #bbf7d0; }
  .node-card.WARNING  { background: #fffbeb; border-color: #fde68a; }
  .node-card.CRITICAL { background: #fef2f2; border-color: #fecaca; }

  .node-label { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
  .SAFE     .node-label { color: #16a34a; }
  .WARNING  .node-label { color: #d97706; }
  .CRITICAL .node-label { color: #dc2626; }

  .node-stats { font-size: 0.6rem; color: #888; line-height: 1.6; }
  .threat-tag {
    font-size: 0.5rem; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; display: inline-block; margin-top: 4px;
  }
  .SAFE     .threat-tag { background: #dcfce7; color: #16a34a; }
  .WARNING  .threat-tag { background: #fef3c7; color: #d97706; }
  .CRITICAL .threat-tag { background: #fee2e2; color: #dc2626; }

  /* ─── Health Score Row ────────────────────────────────────── */
  .health-row { display: flex; align-items: center; gap: 14px; }
  .health-score {
    width: 68px; height: 68px; border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 1px solid; flex-shrink: 0;
  }
  .health-score .value { font-size: 1.4rem; font-weight: 700; }
  .health-score .max   { font-size: 0.6rem; color: #aaa; }

  .bar-list { flex: 1; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.7rem; }
  .bar-label  { width: 48px; color: #aaa; }
  .bar-track  { flex: 1; height: 5px; background: #f0f0ea; border-radius: 3px; overflow: hidden; }
  .bar-fill   { height: 100%; border-radius: 3px; }
  .bar-count  { width: 28px; text-align: right; color: #aaa; font-size: 0.65rem; }

  /* ─── Source / Destination Pills ─────────────────────────── */
  .endpoint-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .endpoint-pill {
    flex: 1; background: #eff6ff; border: 1px solid #bfdbfe;
    border-radius: 8px; padding: 10px;
  }
  .endpoint-pill .ep-label {
    font-size: 0.6rem; color: #2563eb; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .endpoint-pill .ep-value { font-size: 1.3rem; font-weight: 700; color: #1a1a18; }

  /* ─── Safest Path Result ──────────────────────────────────── */
  .path-result {
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-radius: 8px; padding: 14px; margin-bottom: 12px;
  }
  .path-result .path-label { font-size: 0.62rem; color: #16a34a; font-weight: 600; margin-bottom: 6px; }
  .path-result .path-str   { font-size: 1rem; font-weight: 600; color: #16a34a; }

  .no-path-msg {
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 8px; padding: 14px; color: #dc2626; font-weight: 500;
  }

  /* ─── Path Metrics Row ────────────────────────────────────── */
  .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .metric-box {
    background: #f8f8f5; border: 1px solid #e2e2dc;
    border-radius: 8px; padding: 10px; text-align: center;
  }
  .metric-box .m-value { font-size: 1.1rem; font-weight: 700; color: #1a1a18; }
  .metric-box .m-label {
    font-size: 0.6rem; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px;
  }

  /* ─── Loading / Error Screen ──────────────────────────────── */
  .centered-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 80vh; gap: 14px; text-align: center;
  }
  .error-card {
    background: white; border: 1px solid #e2e2dc;
    border-radius: 10px; padding: 24px; max-width: 380px;
  }
  .error-card .err-title { font-weight: 600; margin-bottom: 6px; }
  .error-card .err-body  { font-size: 0.8rem; color: #888; line-height: 1.7; }
  code { background: #f5f5f0; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
</style>
</head>
<body>
<div id="app">
  <div class="centered-screen">
    <div style="font-size:1.3rem;font-weight:700">🛡️ PATHGUARD</div>
    <div style="color:#aaa;font-size:0.8rem">Loading...</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   COLOR HELPERS
   Returns visual styling values based on threat level string.
═══════════════════════════════════════════════════════════════ */
const threatColor      = level => level === 'CRITICAL' ? '#dc2626' : level === 'WARNING' ? '#d97706' : '#16a34a';
const threatBackground = level => level === 'CRITICAL' ? '#fef2f2' : level === 'WARNING' ? '#fffbeb' : '#f0fdf4';
const threatBorder     = level => level === 'CRITICAL' ? '#fecaca' : level === 'WARNING' ? '#fde68a' : '#bbf7d0';


/* ═══════════════════════════════════════════════════════════════
   NETWORK HEALTH SCORE  (0–100)
   Penalises WARNING nodes by 50% weight and CRITICAL by 100%.
═══════════════════════════════════════════════════════════════ */
function calcNetworkHealth(nodes) {
  const total     = nodes.length;
  const warnings  = nodes.filter(n => n.threat === 'WARNING').length;
  const criticals = nodes.filter(n => n.threat === 'CRITICAL').length;
  return Math.max(0, Math.round(100 - (warnings / total) * 50 - (criticals / total) * 100));
}


/* ═══════════════════════════════════════════════════════════════
   DIJKSTRA'S SHORTEST PATH  (threat-aware)
   - Skips CRITICAL nodes entirely (treated as blocked).
   - Doubles edge weight when passing through a WARNING node.
   Returns { path: [nodeIndex, ...], cost: number } or null.
═══════════════════════════════════════════════════════════════ */
function findSafestPath(nodes, edges, sourceIndex, destIndex) {
  const nodeCount = nodes.length;
  const adjacency = Array.from({ length: nodeCount }, () => []);

  // Build undirected adjacency list from edge definitions
  edges.forEach(edge => {
    adjacency[edge.from].push([edge.to,   edge.weight]);
    adjacency[edge.to  ].push([edge.from, edge.weight]);
  });

  const distances = Array(nodeCount).fill(Infinity);
  const parents   = Array(nodeCount).fill(-1);
  const visited   = Array(nodeCount).fill(false);

  distances[sourceIndex] = 0;

  for (let step = 0; step < nodeCount - 1; step++) {
    // Pick unvisited node with the lowest known distance
    let current = -1;
    for (let i = 0; i < nodeCount; i++) {
      if (!visited[i] && distances[i] < (current < 0 ? Infinity : distances[current])) {
        current = i;
      }
    }

    if (current < 0) break;

    // CRITICAL nodes are considered blocked — skip them
    if (nodes[current].threat === 'CRITICAL') {
      visited[current] = true;
      continue;
    }

    visited[current] = true;

    for (const [neighbor, edgeWeight] of adjacency[current]) {
      if (visited[neighbor] || nodes[neighbor].threat === 'CRITICAL') continue;

      // WARNING nodes are still traversable but cost twice as much
      const moveCost = nodes[neighbor].threat === 'WARNING' ? edgeWeight * 2 : edgeWeight;

      if (distances[current] + moveCost < distances[neighbor]) {
        distances[neighbor] = distances[current] + moveCost;
        parents[neighbor]   = current;
      }
    }
  }

  // No reachable path found
  if (distances[destIndex] === Infinity) return null;

  // Reconstruct path by walking back through parent pointers
  const path = [];
  for (let node = destIndex; node >= 0; node = parents[node]) {
    path.unshift(node);
  }

  return { path, cost: distances[destIndex] };
}


/* ═══════════════════════════════════════════════════════════════
   PATH RELIABILITY SCORE  (0–100)
   Starts at 100 and deducts points for risky nodes on the path.
═══════════════════════════════════════════════════════════════ */
function calcPathReliability(nodes, path) {
  let score = 100;
  path.forEach(nodeIndex => {
    if      (nodes[nodeIndex].threat === 'CRITICAL') score -= 40;
    else if (nodes[nodeIndex].threat === 'WARNING')  score -= 15;
  });
  return Math.max(0, score);
}


/* ═══════════════════════════════════════════════════════════════
   D3 NETWORK GRAPH
   Draws nodes in a circle. Highlights edges that are on the
   safest path in green; all others are light grey.
═══════════════════════════════════════════════════════════════ */
function drawNetworkGraph(nodes, edges, highlightedPath) {
  const svg    = d3.select('#network-graph');
  const width  = svg.node().clientWidth  || 480;
  const height = svg.node().clientHeight || 320;
  svg.selectAll('*').remove();

  const centerX = width  / 2;
  const centerY = height / 2;
  const radius  = Math.min(width, height) * 0.33;

  // Position nodes evenly around a circle, starting from the top
  const nodePositions = nodes.map((_, i) => ({
    x: centerX + radius * Math.cos(2 * Math.PI * i / nodes.length - Math.PI / 2),
    y: centerY + radius * Math.sin(2 * Math.PI * i / nodes.length - Math.PI / 2),
  }));

  // Build a set of edge keys that belong to the safest path
  const pathEdgeKeys = new Set();
  if (highlightedPath) {
    for (let i = 0; i < highlightedPath.length - 1; i++) {
      const a = Math.min(highlightedPath[i], highlightedPath[i + 1]);
      const b = Math.max(highlightedPath[i], highlightedPath[i + 1]);
      pathEdgeKeys.add(`${a}-${b}`);
    }
  }

  // Draw edges
  edges.forEach(edge => {
    const edgeKey = `${Math.min(edge.from, edge.to)}-${Math.max(edge.from, edge.to)}`;
    const onPath  = pathEdgeKeys.has(edgeKey);
    const posFrom = nodePositions[edge.from];
    const posTo   = nodePositions[edge.to];

    svg.append('line')
      .attr('x1', posFrom.x).attr('y1', posFrom.y)
      .attr('x2', posTo.x  ).attr('y2', posTo.y  )
      .attr('stroke',       onPath ? '#16a34a' : '#e2e2dc')
      .attr('stroke-width', onPath ? 2.5        : 1.2);

    svg.append('text')
      .attr('x', (posFrom.x + posTo.x) / 2)
      .attr('y', (posFrom.y + posTo.y) / 2 - 5)
      .attr('text-anchor', 'middle')
      .attr('font-size', '9px')
      .attr('fill', onPath ? '#16a34a' : '#ccc')
      .text(edge.weight);
  });

  // Draw node circles + labels
  nodes.forEach((node, i) => {
    const { x, y } = nodePositions[i];
    const color    = threatColor(node.threat);
    const bg       = threatBackground(node.threat);
    const isOnPath = highlightedPath && highlightedPath.includes(i);

    svg.append('circle')
      .attr('cx', x).attr('cy', y).attr('r', 22)
      .attr('fill', bg)
      .attr('stroke',       color)
      .attr('stroke-width', isOnPath ? 2.5 : 1.5);

    svg.append('text')
      .attr('x', x).attr('y', y + 5)
      .attr('text-anchor', 'middle')
      .attr('font-size', '13px').attr('font-weight', '700')
      .attr('fill', color)
      .text(node.name);

    svg.append('text')
      .attr('x', x).attr('y', y + 36)
      .attr('text-anchor', 'middle')
      .attr('font-size', '7px').attr('fill', '#aaa')
      .text(node.threat);
  });
}


/* ═══════════════════════════════════════════════════════════════
   MAIN RENDER
   Takes the parsed JSON data and builds the full dashboard UI.
═══════════════════════════════════════════════════════════════ */
function renderDashboard(data) {
  const { nodes, edges, source, dest } = data;

  const pathResult    = findSafestPath(nodes, edges, source, dest);
  const healthScore   = calcNetworkHealth(nodes);
  const healthLevel   = healthScore >= 70 ? 'SAFE' : healthScore >= 40 ? 'WARNING' : 'CRITICAL';
  const healthLabel   = healthScore >= 70 ? 'Healthy' : healthScore >= 40 ? 'At Risk' : 'Critical';
  const healthColor   = threatColor(healthLevel);

  const safeCount     = nodes.filter(n => n.threat === 'SAFE').length;
  const warningCount  = nodes.filter(n => n.threat === 'WARNING').length;
  const criticalCount = nodes.filter(n => n.threat === 'CRITICAL').length;
  const total         = nodes.length;

  const reliability      = pathResult ? calcPathReliability(nodes, pathResult.path) : 0;
  const reliabilityLevel = reliability >= 80 ? 'SAFE' : reliability >= 50 ? 'WARNING' : 'CRITICAL';
  const reliabilityLabel = reliability >= 80 ? 'Highly Secure' : reliability >= 50 ? 'Moderate' : reliability > 0 ? 'Low Security' : 'Unsafe';
  const reliabilityColor = threatColor(reliabilityLevel);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="logo">🛡️ PATHGUARD</div>
      <div class="status-badge" style="
        background:${threatBackground(healthLevel)};
        border-color:${threatBorder(healthLevel)};
        color:${healthColor}">
        ● Network ${healthLabel}
      </div>
    </div>

    <div class="grid">

      <div class="card">
        <div class="card-title">Network Topology</div>
        <svg id="network-graph"></svg>
      </div>

      <div class="card">
        <div class="card-title">Node Status</div>
        <div class="node-grid">
          ${nodes.map(node => `
            <div class="node-card ${node.threat}">
              <div class="node-label">${node.name}</div>
              <div class="node-stats">TRF ${node.traffic}<br>DRP ${node.drop}%</div>
              <div class="threat-tag">${node.threat}</div>
            </div>
          `).join('')}
        </div>

        <br>
        <div class="card-title" style="margin-top:4px">Network Health</div>
        <div class="health-row">
          <div class="health-score" style="background:${threatBackground(healthLevel)};border-color:${threatBorder(healthLevel)}">
            <div class="value" style="color:${healthColor}">${healthScore}</div>
            <div class="max">/ 100</div>
          </div>
          <div class="bar-list">
            <div class="bar-row">
              <div class="bar-label" style="color:#16a34a">Safe</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(safeCount / total) * 100}%;background:#16a34a"></div></div>
              <div class="bar-count">${safeCount}/${total}</div>
            </div>
            <div class="bar-row">
              <div class="bar-label" style="color:#d97706">Warn</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(warningCount / total) * 100}%;background:#d97706"></div></div>
              <div class="bar-count">${warningCount}/${total}</div>
            </div>
            <div class="bar-row">
              <div class="bar-label" style="color:#dc2626">Crit</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(criticalCount / total) * 100}%;background:#dc2626"></div></div>
              <div class="bar-count">${criticalCount}/${total}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card full-width">
        <div class="card-title">Path Analysis</div>
        <div class="endpoint-row">
          <div class="endpoint-pill">
            <div class="ep-label">Source</div>
            <div class="ep-value">${nodes[source].name}</div>
          </div>
          <div class="endpoint-pill">
            <div class="ep-label">Destination</div>
            <div class="ep-value">${nodes[dest].name}</div>
          </div>
        </div>

        ${pathResult ? `
          <div class="path-result">
            <div class="path-label">SAFEST PATH</div>
            <div class="path-str">${pathResult.path.map(i => nodes[i].name).join(' → ')}</div>
          </div>
          <div class="metrics-row">
            <div class="metric-box">
              <div class="m-value">${pathResult.cost}</div>
              <div class="m-label">Cost</div>
            </div>
            <div class="metric-box">
              <div class="m-value" style="color:${reliabilityColor}">${reliability}/100</div>
              <div class="m-label">Reliability</div>
            </div>
            <div class="metric-box">
              <div class="m-value">${pathResult.path.length}</div>
              <div class="m-label">Hops</div>
            </div>
            <div class="metric-box">
              <div class="m-value" style="color:${reliabilityColor};font-size:0.8rem">${reliabilityLabel}</div>
              <div class="m-label">Security</div>
            </div>
          </div>
        ` : `
          <div class="no-path-msg">⚠ No safe path found — source or destination is compromised</div>
        `}
      </div>

    </div>
  `;

  setTimeout(() => drawNetworkGraph(nodes, edges, pathResult ? pathResult.path : null), 50);
}


/* ═══════════════════════════════════════════════════════════════
   BOOTSTRAP
   Fetches output.json from the C++ backend.
   Shows setup instructions if the file isn't found.
═══════════════════════════════════════════════════════════════ */
fetch('output.json')
  .then(response => {
    if (!response.ok) throw new Error('File not found');
    return response.json();
  })
  .then(data => renderDashboard(data))
  .catch(() => {
    document.getElementById('app').innerHTML = `
      <div class="centered-screen">
        <div style="font-size:1.3rem;font-weight:700">🛡️ PATHGUARD</div>
        <div class="error-card">
          <div class="err-title">output.json not found</div>
          <div class="err-body">
            Step 1 — Run the C++ program:<br><code>./pathguard</code><br><br>
            Step 2 — Start a local server:<br><code>python3 -m http.server 8080</code><br><br>
            Step 3 — Open in browser:<br><code>http://localhost:8080/pathguard_ui.html</code>
          </div>
        </div>
      </div>`;
  });
</script>
</body>
</html>
